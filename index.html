<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillSync — Chrome Extension for Job Seekers</title>
  <meta name="description" content="SkillSync is a Chrome extension that analyzes job postings and shows job seekers exactly which skills they are missing and how to close those gaps." />
  <style>
    :root {
      --bg: #070b1a;
      --bg2: #0b1024;
      --card: rgba(16, 24, 48, 0.72);
      --card-strong: rgba(18, 28, 58, 0.92);
      --stroke: rgba(148, 163, 255, 0.18);
      --text: #edf2ff;
      --muted: #aeb8e6;
      --muted-2: #8e98c7;
      --primary: #7c3aed;
      --primary-2: #2563eb;
      --accent: #22d3ee;
      --success: #22c55e;
      --danger: #fb7185;
      --warning: #f59e0b;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.22);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 15% 10%, rgba(124, 58, 237, 0.38), transparent 50%),
        radial-gradient(1000px 600px at 85% 15%, rgba(37, 99, 235, 0.35), transparent 48%),
        radial-gradient(900px 500px at 50% 100%, rgba(34, 211, 238, 0.18), transparent 40%),
        linear-gradient(180deg, #060814 0%, #090e20 35%, #070b16 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(18px);
      background: linear-gradient(180deg, rgba(6, 8, 20, 0.82), rgba(6, 8, 20, 0.56));
      border-bottom: 1px solid rgba(148, 163, 255, 0.12);
    }

    .nav-inner {
      height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.2px;
      font-size: 1.1rem;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      display: grid;
      place-items: center;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.35);
      position: relative;
      overflow: hidden;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      inset: -30%;
      background: linear-gradient(135deg, rgba(255,255,255,0.35), transparent 50%, rgba(255,255,255,0.12));
      transform: rotate(25deg);
    }

    .brand-mark svg { position: relative; z-index: 1; }
    .nav-links {
      display: flex;
      gap: 24px;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.95rem;
    }
    .nav-links a { opacity: 0.9; transition: 0.25s ease; }
    .nav-links a:hover { color: #fff; opacity: 1; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 0;
      padding: 14px 20px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      user-select: none;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 18px 40px rgba(37, 99, 235, 0.32);
    }
    .btn-secondary {
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(148, 163, 255, 0.18);
      box-shadow: var(--shadow-soft);
    }

    .hero {
      position: relative;
      padding: 88px 0 44px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 34px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(124, 58, 237, 0.12);
      border: 1px solid rgba(124, 58, 237, 0.22);
      color: #d8ccff;
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(2.9rem, 6vw, 5.8rem);
      line-height: 0.96;
      margin: 0;
      letter-spacing: -0.04em;
    }

    .gradient-text {
      background: linear-gradient(135deg, #ffffff 0%, #b7c5ff 32%, #9a7bff 64%, #4ddcff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero p {
      margin: 20px 0 0;
      font-size: clamp(1.05rem, 1.65vw, 1.2rem);
      line-height: 1.75;
      color: var(--muted);
      max-width: 60ch;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 30px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 28px;
      color: var(--muted-2);
      font-size: 0.95rem;
    }

    .meta-chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(148, 163, 255, 0.12);
    }

    .hero-card {
      background: linear-gradient(180deg, rgba(20, 30, 61, 0.88), rgba(12, 17, 38, 0.9));
      border: 1px solid rgba(148, 163, 255, 0.16);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::before,
    .hero-card::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(20px);
      opacity: 0.75;
    }
    .hero-card::before {
      width: 220px;
      height: 220px;
      right: -70px;
      top: -90px;
      background: rgba(124, 58, 237, 0.24);
    }
    .hero-card::after {
      width: 180px;
      height: 180px;
      left: -60px;
      bottom: -70px;
      background: rgba(37, 99, 235, 0.2);
    }

    .mini-heading {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }
    .mini-heading h3 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
    }

    .score-pill {
      position: relative;
      z-index: 1;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(251, 113, 133, 0.14);
      border: 1px solid rgba(251, 113, 133, 0.24);
      color: #ffd5dc;
      font-weight: 800;
      font-size: 0.92rem;
    }

    .report-preview {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 14px;
    }

    .report-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(148, 163, 255, 0.12);
    }

    .report-row strong { display: block; margin-bottom: 4px; }
    .report-row span { color: var(--muted); line-height: 1.55; }
    .tiny {
      font-size: 0.9rem;
      color: var(--muted-2);
    }

    section {
      padding: 34px 0;
    }

    .section-header {
      margin-bottom: 22px;
      max-width: 720px;
    }
    .section-header h2 {
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      margin: 0 0 10px;
      letter-spacing: -0.03em;
    }
    .section-header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .grid-3, .grid-4 {
      display: grid;
      gap: 18px;
    }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .card {
      background: linear-gradient(180deg, rgba(20, 30, 61, 0.72), rgba(11, 16, 36, 0.9));
      border: 1px solid rgba(148, 163, 255, 0.14);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 22px;
      position: relative;
      overflow: hidden;
    }

    .card h3 {
      margin: 16px 0 10px;
      font-size: 1.15rem;
    }
    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .step-number, .feature-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.22), rgba(37, 99, 235, 0.22));
      border: 1px solid rgba(148, 163, 255, 0.16);
      color: #dfe7ff;
      font-weight: 800;
    }

    .feature-icon svg, .step-number svg { width: 22px; height: 22px; }

    .gap-section {
      padding-top: 10px;
    }

    .gap-wrap {
      background: linear-gradient(180deg, rgba(20, 30, 61, 0.84), rgba(10, 14, 31, 0.92));
      border: 1px solid rgba(148, 163, 255, 0.16);
      border-radius: calc(var(--radius-xl) + 2px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .gap-head {
      padding: 26px 26px 0;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .gap-head h3 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }
    .gap-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .score-box {
      min-width: 190px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(251, 113, 133, 0.1);
      border: 1px solid rgba(251, 113, 133, 0.2);
      text-align: center;
    }
    .score-box .score {
      font-size: 2.2rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
      color: #ffd5dc;
    }
    .score-box .label {
      font-size: 0.9rem;
      color: #f6b4c0;
      font-weight: 700;
    }

    .gap-body {
      padding: 22px 26px 26px;
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr 1fr;
    }

    .panel {
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(148, 163, 255, 0.12);
      padding: 18px;
    }

    .panel h4 {
      margin: 0 0 14px;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      padding: 10px 12px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 700;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .chip.missing {
      background: rgba(251, 113, 133, 0.12);
      color: #ffd5dc;
      border-color: rgba(251, 113, 133, 0.22);
    }

    .chip.rec {
      background: rgba(34, 211, 238, 0.1);
      color: #d6fbff;
      border-color: rgba(34, 211, 238, 0.22);
      font-weight: 600;
      line-height: 1.4;
      align-items: flex-start;
      border-radius: 18px;
      padding: 12px 14px;
      max-width: 100%;
    }

    .list {
      display: grid;
      gap: 12px;
    }
    .list-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(148, 163, 255, 0.1);
    }
    .bullet {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 7px;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.09);
      flex: 0 0 auto;
    }

    .testimonials {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,
