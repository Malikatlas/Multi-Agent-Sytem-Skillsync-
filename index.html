<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillSync — Chrome Extension for Job Seekers</title>
  <style>
    :root{
      --bg: #07111f;
      --bg-2: #0b1730;
      --card: rgba(11, 23, 48, 0.72);
      --card-strong: rgba(13, 28, 58, 0.92);
      --border: rgba(159, 179, 255, 0.18);
      --text: #eaf0ff;
      --muted: #aab7de;
      --accent: #7c5cff;
      --accent-2: #4cc9f0;
      --accent-3: #31d0aa;
      --danger: #ff6b8b;
      --warning: #ffcc66;
      --shadow: 0 24px 80px rgba(0,0,0,0.35);
      --radius: 22px;
      --radius-sm: 16px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,92,255,0.28), transparent 34%),
        radial-gradient(circle at top right, rgba(76,201,240,0.20), transparent 28%),
        linear-gradient(180deg, #050b16 0%, var(--bg) 40%, #060b16 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: rgba(5, 11, 22, 0.62);
      border-bottom: 1px solid rgba(159, 179, 255, 0.10);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      gap: 20px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.2px;
      font-size: 1.1rem;
    }
    .logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 30px rgba(124,92,255,0.35);
      position: relative;
      overflow: hidden;
    }
    .logo:before {
      content: "";
      position: absolute;
      inset: -20%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: rotate(20deg);
    }
    .logo svg { position: relative; z-index: 1; }
    .nav-links {
      display: flex;
      gap: 22px;
      color: var(--muted);
      font-weight: 600;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .nav-links a:hover { color: var(--text); }

    .hero {
      padding: 76px 0 32px;
      position: relative;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: center;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid rgba(159, 179, 255, 0.16);
      background: rgba(124,92,255,0.10);
      border-radius: 999px;
      color: #dcd3ff;
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 6vw, 5.1rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
      max-width: 12ch;
    }
    .gradient-text {
      background: linear-gradient(135deg, #ffffff 0%, #b9c6ff 34%, #6ee7ff 68%, #8f7cff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero p {
      margin: 22px 0 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.75;
      max-width: 60ch;
    }
    .hero-actions {
      display: flex;
      gap: 14px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 15px 22px;
      font-weight: 800;
      font-size: 0.98rem;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--accent) 0%, #5c9bff 45%, var(--accent-2) 100%);
      box-shadow: 0 18px 34px rgba(92, 155, 255, 0.28);
    }
    .btn-secondary {
      color: var(--text);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(159, 179, 255, 0.18);
    }
    .btn:hover { transform: translateY(-2px); }

    .hero-card {
      background: linear-gradient(180deg, rgba(15, 31, 66, 0.92), rgba(7, 16, 31, 0.88));
      border: 1px solid rgba(159, 179, 255, 0.16);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .hero-card:before {
      content: "";
      position: absolute;
      inset: auto -20% 55% auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(76,201,240,0.24), transparent 68%);
      filter: blur(4px);
    }
    .mock-browser {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      overflow: hidden;
    }
    .mock-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ff6b8b; opacity: .8; }
    .dot:nth-child(2) { background: #ffcc66; }
    .dot:nth-child(3) { background: #31d0aa; }
    .mock-content {
      padding: 18px;
    }
    .mock-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 18px;
    }
    .mock-title h3 {
      margin: 0;
      font-size: 1.1rem;
    }
    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(76,201,240,0.12);
      color: #aef1ff;
      font-weight: 700;
      font-size: .84rem;
      border: 1px solid rgba(76,201,240,0.18);
    }
    .mini-metric {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, 1fr);
      margin-top: 16px;
    }
    .metric {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(159, 179, 255, 0.12);
      border-radius: 16px;
      padding: 16px;
    }
    .metric span { color: var(--muted); font-size: .86rem; display:block; margin-bottom: 8px; }
    .metric strong { font-size: 1.3rem; }
    .skill-row {
      display:flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    .badge {
      padding: 10px 12px;
      border-radius: 999px;
      font-size: .86rem;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .badge.match { background: rgba(49,208,170,0.13); border-color: rgba(49,208,170,0.22); color: #a9ffe9; }
    .badge.missing { background: rgba(255,107,139,0.12); border-color: rgba(255,107,139,0.22); color: #ffd0da; }
    .badge.rec { background: rgba(124,92,255,0.14); border-color: rgba(124,92,255,0.22); color: #ddd5ff; }

    section { padding: 44px 0; }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .section-head h2 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.6rem);
      letter-spacing: -0.03em;
    }
    .section-head p {
      margin: 0;
      color: var(--muted);
      max-width: 60ch;
      line-height: 1.7;
    }

    .grid-3, .grid-4 {
      display: grid;
      gap: 18px;
    }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }

    .card {
      background: linear-gradient(180deg, rgba(15, 31, 66, 0.82), rgba(9, 18, 38, 0.86));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.18);
      transition: transform .2s ease, border-color .2s ease;
    }
    .card:hover { transform: translateY(-4px); border-color: rgba(124,92,255,0.34); }
    .step-num {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display:grid;
      place-items:center;
      font-weight: 900;
      background: linear-gradient(135deg, rgba(124,92,255,0.2), rgba(76,201,240,0.18));
      border: 1px solid rgba(159,179,255,0.16);
      margin-bottom: 14px;
    }
    .card h3 { margin: 0 0 10px; font-size: 1.15rem; }
    .card p { margin: 0; color: var(--muted); line-height: 1.7; }

    .feature-icon {
      width: 52px; height: 52px;
      border-radius: 16px;
      display:grid;
      place-items:center;
      margin-bottom: 14px;
      background: linear-gradient(135deg, rgba(124,92,255,0.20), rgba(76,201,240,0.16));
      border: 1px solid rgba(159,179,255,0.18);
      font-size: 1.2rem;
    }

    .report-wrap {
      background:
        radial-gradient(circle at top right, rgba(124,92,255,0.22), transparent 34%),
        radial-gradient(circle at bottom left, rgba(76,201,240,0.14), transparent 28%),
        linear-gradient(180deg, rgba(10, 18, 37, 0.92), rgba(7, 14, 30, 0.92));
      border: 1px solid rgba(159,179,255,0.14);
      border-radius: 30px;
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .report-top {
      display:flex;
      justify-content: space-between;
      align-items:center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .score {
      display:flex;
      align-items:center;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .score-ring {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: conic-gradient(var(--warning) 0 40%, rgba(255,255,255,0.09) 40% 100%);
      display:grid;
      place-items:center;
    }
    .score-ring > div {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #081224;
      display:grid;
      place-items:center;
      font-weight: 900;
      font-size: .95rem;
    }
    .report-grid {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .report-panel {
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(159,179,255,0.12);
      border-radius: 20px;
      padding: 18px;
    }
    .report-panel h4 { margin: 0 0 12px; font-size: 1rem; }
    .list {
      display:flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .list-item {
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 11px 13px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(159,179,255,0.12);
      color: var(--text);
      font-weight: 600;
    }
    .dot-sm {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent-3);
      box-shadow: 0 0 0 6px rgba(49,208,170,0.10);
    }
    .dot-sm.miss { background: var(--danger); box-shadow: 0 0 0 6px rgba(255,107,139,0.10); }
    .rec-card {
      display:flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 13px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(159,179,255,0.12);
      margin-bottom: 10px;
    }
    .rec-card:last-child { margin-bottom: 0; }
    .rec-card small { color: var(--muted); display:block; margin-top: 3px; }

    .testimonials .card { height: 100%; }
    .quote {
      font-size: 1rem;
      line-height: 1.8;
      color: #dce5ff;
      margin-bottom: 18px;
    }
    .person {
      display:flex;
      align-items:center;
      gap: 14px;
    }
    .avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display:grid;
      place-items:center;
      font-weight: 900;
    }
    .person strong { display:block; }
    .person span { color: var(--muted);
